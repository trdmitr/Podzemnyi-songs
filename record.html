<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Record</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    input, select, button { padding: 10px; font-size: 1rem; margin: 6px 0; width: 100%; }
    button { background: #1a56db; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button.secondary { background: #6b7280; }
    .hidden { display: none; }
    #status { margin-top: 16px; padding: 10px; border-radius: 4px; }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #b91c1c; }
    /* Стили для контейнера (плашки) */
  .delete-mode-container {
    display: inline-flex;
    align-items: center;
    background: #f0f0f0;    /* Спокойный серый по умолчанию */
    padding: 12px 20px;
    border-radius: 8px;
    margin-bottom: 20px;    /* Отступ от "Исполнителя" */
    cursor: pointer;
    transition: all 0.3s ease; /* Плавная смена цвета */
    border: 1px solid #ccc;
    font-family: sans-serif;
  }

  /* Увеличиваем чекбокс */
  #delete-mode {
    transform: scale(1.5);
    margin-right: 15px;
    cursor: pointer;
  }

  /* МАГИЯ: если чекбокс внутри контейнера нажат, меняем стиль всего контейнера */
  .delete-mode-container:has(#delete-mode:checked) {
    background-color: #d9534f; /* Красный цвет (danger) */
    border-color: #b52b27;
    color: white;              /* Белый текст для читаемости */
    box-shadow: 0 0 10px rgba(217, 83, 79, 0.5); /* Легкое свечение */
  }
  </style>
</head>
<body>
  <h1>🎸 Record</h1>

  <div id="login" style="text-align:center;">
    <label><strong>Пароль:</strong></label><br>
    <input type="password" id="pwd" placeholder="Введите пароль" style="width:80%;margin:0 auto;">
    <br><br>
    <button type="button" onclick="login()" style="width:80%;margin:0 auto;">🔐 Войти</button>
  </div>

<div id="form" class="hidden">
<!-- Сама разметка -->
<label class="delete-mode-container">
  <input type="checkbox" id="delete-mode">
  <span>🗑️ Режим удаления</span>
</label><br/>
<label><strong>Исполнитель:</strong></label>
<select id="performer" onchange="loadSongsForPerformer()">
  <option value="">— Выберите —</option>
</select>
<button type="button" onclick="toggleNew()">➕ Новый</button>
<button type="button" id="delete-group-btn" style="display:none;" onclick="deleteGroup()">❌ Удалить группу</button>

<div id="new-performer-div" class="hidden">
  <label><strong>Новый исполнитель:</strong></label>
  <input type="text" id="new-performer" placeholder="Например: Виктор Цой">
</div>

<label><strong>Песни:</strong></label>
<div id="songs-list"></div>

<label><<strong>Новая песня:</strong></label>
<input type="text" id="song" placeholder="Например: 18 Берёз">
<button type="button" onclick="saveSong()">✅ Добавить песню</button>
</div>

  <div id="status"></div>

 <button type="button" onclick="window.open('https://trdmitr.github.io/Podzemnyi-songs/', '_blank')" class="secondary" style="width:100%;margin-top:24px;">
  🏠 На главную страницу
</button>

<script>
const DATA_URL = "https://trv-axtuba.ru/podzemnyi/read.php";
const SAVE_URL = "https://trv-axtuba.ru/podzemnyi/save.php";

let currentData = [];

function login() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('form').classList.remove('hidden');
  loadAll();
}

async function loadAll() {
  const res = await fetch(DATA_URL + '?_=' + Date.now());
  currentData = await res.json();
  renderPerformerSelect();
}

function renderPerformerSelect() {
  const sel = document.getElementById('performer');
  sel.innerHTML = '<option value="">— Выберите —</option>';
  
  // Сортируем группы по имени исполнителя (по алфавиту)
  currentData
    .map(g => g) // копируем массив
    .sort((a, b) => a.name.localeCompare(b.name, 'ru', { sensitivity: 'base' }))
    .forEach(g => {
      const opt = document.createElement('option');
      opt.value = g.name;
      opt.textContent = g.name;
      sel.appendChild(opt);
    });

  document.getElementById('delete-group-btn').style.display = 'none';
  document.getElementById('songs-list').innerHTML = '';
}

// 🔥 ОСНОВНАЯ ФУНКЦИЯ ОБНОВЛЕНИЯ СПИСКА ПЕСЕН
function loadSongsForPerformer() {
  const performer = document.getElementById('performer').value;
  const deleteMode = document.getElementById('delete-mode').checked;
  const group = currentData.find(g => g.name === performer);

  const songsDiv = document.getElementById('songs-list');
  if (!group) {
    songsDiv.innerHTML = '';
    document.getElementById('delete-group-btn').style.display = 'none';
    return;
  }

  // 🔥 ГАРАНТИРУЕМ СОРТИРОВКУ ПРИ КАЖДОМ ВЫЗОВЕ
  const sortedSongs = [...group.songs].sort((a, b) =>
    a.localeCompare(b, 'ru', { sensitivity: 'base' })
  );

  // Показываем кнопку удаления группы ТОЛЬКО если включён режим удаления
  document.getElementById('delete-group-btn').style.display = deleteMode ? 'inline-block' : 'none';

  // Генерируем список песен
  songsDiv.innerHTML = sortedSongs.map(song => `
    <div style="margin:4px 0;">
      ${escapeHtml(song)}
      ${deleteMode ? `<button type="button" style="margin-left:8px;font-size:0.9em;" onclick="deleteSong('${escapeHtml(performer)}', '${escapeHtml(song).replace(/'/g, "\\'")}')">🗑️</button>` : ''}
    </div>
  `).join('');
}

// 🔥 ОБРАБОТЧИК ИЗМЕНЕНИЯ ЧЕКБОКСА
document.addEventListener('DOMContentLoaded', () => {
  const deleteModeCheckbox = document.getElementById('delete-mode');
  if (deleteModeCheckbox) {
    deleteModeCheckbox.addEventListener('change', () => {
      // Перезагружаем список песен при переключении режима
      const performer = document.getElementById('performer').value;
      if (performer) {
        loadSongsForPerformer();
      } else {
        document.getElementById('songs-list').innerHTML = '';
        document.getElementById('delete-group-btn').style.display = 'none';
      }
    });
  }
});

function toggleNew() {
  document.getElementById('new-performer-div').classList.toggle('hidden');
}

async function saveSong() {
  const sel = document.getElementById('performer');
  const newPerformer = document.getElementById('new-performer').value.trim();
  const song = document.getElementById('song').value.trim();

  if (!song) return showStatus('❌ Укажите название песни', 'error');
  let performer = sel.value || newPerformer;
  if (!performer) return showStatus('❌ Выберите или укажите исполнителя', 'error');

  let group = currentData.find(g => g.name === performer);
  if (!group) {
    group = { name: performer, songs: [], image: "" };
    currentData.push(group);
  }

  // Добавляем песню и сразу сортируем по алфавиту (для русского языка)
  if (!group.songs.includes(song)) {
    group.songs.push(song);
    group.songs.sort((a, b) => a.localeCompare(b, 'ru', { sensitivity: 'base' }));
  }

  await saveData();
  document.getElementById('song').value = '';
  loadSongsForPerformer(); // Обновляем список песен
  showStatus(`✅ Добавлено: ${song}`, 'success');
}

async function deleteSong(performer, song) {
  const group = currentData.find(g => g.name === performer);
  if (group) {
    group.songs = group.songs.filter(s => s !== song);
    if (group.songs.length === 0) {
      currentData = currentData.filter(g => g.name !== performer);
    }
    await saveData();
    loadSongsForPerformer();
    showStatus(`🗑️ Удалено: ${song}`, 'success');
  }
}

async function deleteGroup() {
  const performer = document.getElementById('performer').value;
  if (!performer) return;
  if (!confirm(`Точно удалить всю группу "${performer}"?`)) return;

  currentData = currentData.filter(g => g.name !== performer);
  await saveData();
  renderPerformerSelect();
  showStatus(`❌ Группа "${performer}" удалена`, 'success');
}

async function saveData() {
  const res = await fetch(SAVE_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(currentData)
  });
  if (!res.ok) throw new Error('Ошибка сохранения');
}

function showStatus(text, cls) {
  let el = document.getElementById('status');
  if (!el) {
    el = document.createElement('div');
    el.id = 'status';
    document.body.appendChild(el);
  }
  el.textContent = text;
  el.className = cls;
  setTimeout(() => el.textContent = '', 5000);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
</body>
</html>
